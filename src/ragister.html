<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title -->
    <title>esim</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/images/logo/favicon.png" />
    <!-- Bootstrap -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <!-- Font awesome -->
    <link rel="stylesheet" href="assets/css/fontawesome.min.css" />
    <!-- line awesome -->
    <link rel="stylesheet" href="assets/css/line-awesome.min.css" />
    <!-- Magnific Popup -->
    <link rel="stylesheet" href="assets/css/magnific-popup.css" />
    <!-- Swiper -->
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css" />
    <!-- Select2 -->
    <link rel="stylesheet" href="assets/css/select2.min.css" />
    <!-- Main css -->
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>

  <body>
    <!--==================== Preloader Start ====================-->
<div class="preloader">
  <div class="loader__text" data-text="E-Sim"></div>
</div>
<!--==================== Preloader End ====================-->


    <!-- ==================== Scroll to Top Start ==================== -->
    <a class="scroll-top"><i class="fas fa-angle-double-up"></i></a>
    <!-- ==================== Scroll to Top End ==================== -->

    <!--==========================  Overlay Start  ==========================-->
    <div class="overlay"></div>
    <!--==========================  Overlay End  ==========================-->

<main class="page-wrapper">
    <section class="account">        
        <div class="account-content">
            <div class="account-header">
                <a class="account-logo" href="index.html">
                    <img src="assets/images/logo/logo-dark.png" alt="image">
                </a>
                <div class="account-heading">
                    <h2 class="account-heading__title">Welcome Back!</h2>
                    <p class="account-heading__subtitle">Log in to manage your eSIMs, check data usage, and buy new plans.</p>
                </div>
            </div>
            <div class="account-body">
                <div class="social-auth">
                    <a class="social-auth__btn" href="#">
                        <img src="assets/images/search.png" alt="image">
                        <span>Login with Google</span>
                    </a>
                    <a class="social-auth__btn" href="#">
                        <img src="assets/images/facebook.png" alt="image">
                        <span>Login with Facebook</span>
                    </a>
                </div>

                <div class="account-divider">
                    <span>Or Login with</span>
                </div>

                <form class="account-form" action="!">
                    <div class="row gy-4">
                        <div class="col-sm-6">
                            <label class="form-label">First Name</label>
                            <input class="form-control form--control" type="text" placeholder="Enter your First Name">
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label required">Last Name</label>
                            <input class="form-control form--control" type="text" placeholder="Enter your Last Name">
                        </div>
                        <div class="col-sm-12">
                            <label class="form-label required">Email Address</label>
                            <input class="form-control form--control" type="text" placeholder="Enter your Email Address">
                        </div>
                        <div class="col-sm-6">
                            <div class="form-field form-field--password">
                                <label class="form-label required">Password</label>
                                <div class="input-group input--group input--group-password">
                                    <input class="form-control form--control" type="password" placeholder="Password">
                                    <span class="input-group-text input-group-btn">
                                        <i class="far fa-eye-slash"></i>
                                    </span>
                                </div>
                            </div>
                        
                        </div>
                        <div class="col-sm-6">
                            <div class="form-field form-field--password">
                                <label class="form-label required">Confirm password</label>
                                <div class="input-group input--group input--group-password">
                                    <input class="form-control form--control" type="password" placeholder="Password">
                                    <span class="input-group-text input-group-btn">
                                        <i class="far fa-eye-slash"></i>
                                    </span>
                                </div>
                            </div>
                       
                        </div>
                    </div>
                    <div class="col-sm-12">
                            <div class="form--check gradient mt-4">
                                <input type="checkbox" id="agree" name="agree" class="form-check-input" required="">
                                <label for="agree" class="form-check-label">
                                    I agree with
                                    <a href="#" class="fs-14 ms-1" target="_blank">Privacy Policy</a>
                                    ,
                                    <a href="#" class="fs-14 ms-1" target="_blank">Terms of Service</a>
                                </label>
                            </div>
                        </div>
                    <button class="w-100 btn btn--base mt-4" type="submit">
                        Login now
                    </button>
                </form>

                <p class="account-info">Don't have an account? <a href="ragister.html">Create now</a></p>
            </div>
        </div>

        <div class="account-thumb bg--img" data-background-image="assets/images/signup.png">
            <div class="account-right__content">
                <div class="account-right__content__header">
                    <a href="index.html" class="account-logo-img text-center">
                        <img src="assets/images/logo/logo.png" alt="img">
                    </a>                    
                </div>
            
            </div>
        </div>
    </section>
</main>

<!-- Jquery js -->
<script src="assets/js/jquery-3.7.1.min.js"></script>
<!-- Bootstrap Bundle Js -->
<script src="assets/js/boostrap.bundle.min.js"></script>
<!-- Magnific Popup Js -->
<script src="assets/js/magnific-popup.min.js"></script>
<!-- Scrollreveal Js -->
<script src="assets/js/scrollreveal.min.js"></script>
<!-- Swiper Js -->
<script src="assets/js/swiper-bundle.min.js"></script>
<!-- Odometer Js -->
<script src="assets/js/odometer.min.js"></script>
<!-- Select2 Js -->
<script src="assets/js/select2.min.js"></script>

<!-- main js -->
<script src="assets/js/main.js"></script>
</body>

</html>
